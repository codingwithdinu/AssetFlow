version: "3.9"

services:

  db:
    image: postgres:17
    container_name: assetflow-db

    restart: always

    environment:
      POSTGRES_DB: assetflow
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
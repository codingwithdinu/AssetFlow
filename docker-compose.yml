version: "3.9"

services:

  db:
    image: postgres:17
    container_name: assetflow-db
    restart: always
    environment:
      POSTGRES_DB: assetflow
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d assetflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:18
    container_name: assetflow-odoo
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    ports:
      - "8069:8069"
    volumes:
      - odoo_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./odoo.conf:/etc/odoo/odoo.conf
    command:
      - odoo
      - --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

volumes:
  postgres_data:
  odoo_data:
